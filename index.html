<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Warning</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: #f8d7da; 
            color: #721c24; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            text-align: center; 
        }
        .container { 
            background: white; 
            padding: 2rem; 
            border-radius: 8px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
            border: 2px solid #f5c6cb; 
            max-width: 500px; 
        }
        h1 { 
            font-size: 3rem; 
            margin-bottom: 1rem; 
            color: #dc3545; 
        }
        p { 
            font-size: 1.2rem; 
            line-height: 1.6; 
        }
        .tip { 
            font-weight: bold; 
            margin-top: 1.5rem; 
            color: #155724; 
            background: #d4edda; 
            padding: 10px; 
            border-radius: 4px; 
        }
        .counter-display {
            margin-top: 20px; 
            font-weight: bold; 
            color: #333;
            font-size: 1.1rem;
            border-top: 1px solid #ccc;
            padding-top: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>TRUST NO ONE!</h1>
        <p>You just clicked a link without verifying the destination. In a real-world scam, this could have been a credential harvester or a malware download.</p>
        <div class="tip">
            Pro Tip: Always hover over a link to inspect the URL before clicking.
        </div>
        
        <!-- Visible Counter Display -->
        <div class="counter-display">
            Total "Victims": <span id="count">Loading...</span>
        </div>
    </div>

    <script>
        // Use a unique namespace to prevent interference with other API users
        const namespace = "security-awareness-presentation-2026";
        const key = "scam-click-counter";

        async function updateCounter() {
            try {
                // Fetch request increments the counter by 1 on every page load
                const response = await fetch(`https://api.counterapi.dev/v1/${namespace}/${key}/up`);
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const data = await response.json();
                
                // Update the DOM
                document.getElementById('count').innerText = data.count;
            } catch (error) {
                console.error("Counter failed to load:", error);
                document.getElementById('count').innerText = "Unavailable";
            }
        }

        // Initialize counter
        updateCounter();
    </script>
</body>
</html>
